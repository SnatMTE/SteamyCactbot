name: Release - Update JSON & Deploy Pages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version number (e.g. 0.0.0.2)
        required: true
      tag:
        description: Git tag (e.g. v0.0.0.2)
        required: true
      notes:
        description: Release notes (optional)
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version info
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "notes=${{ inputs.notes }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.event.release.tag_name }}"
            CLEAN="${TAG#v}"
            CLEAN="${CLEAN#V}"
            echo "version=$CLEAN" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate plugin JSON
        id: generate
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          REPO="${{ github.repository }}"
          DOWNLOAD_URL="https://github.com/$REPO/releases/latest/download/CactBridge.zip"

          # Read metadata from the source Dalamud manifest
          AUTHOR="$(jq -r '.Author // "Snat"' CactBridge/CactBridge.json)"
          NAME="$(jq -r '.Name // "CactBridge"' CactBridge/CactBridge.json)"
          INTERNAL_NAME="$(jq -r '.InternalName // "CactBridge"' CactBridge/CactBridge.json)"
          ASSEMBLY_VERSION="$(jq -r '.AssemblyVersion // "0.0.0.1"' CactBridge/CactBridge.json)"
          PUNCHLINE="$(jq -r '.Punchline // ""' CactBridge/CactBridge.json)"
          DESCRIPTION="$(jq -r '.Description // ""' CactBridge/CactBridge.json)"
          APPLICABLE_VERSION="$(jq -r '.ApplicableVersion // "any"' CactBridge/CactBridge.json)"
          DALAMUD_API_LEVEL="$(jq -r '.DalamudApiLevel // 15' CactBridge/CactBridge.json)"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NOTES_RAW="${{ steps.version.outputs.notes }}"
            if [ -z "$NOTES_RAW" ]; then NOTES_FLAG=""; else NOTES_FLAG="$NOTES_RAW"; fi
            PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          else
            NOTES_RAW=$(echo '${{ github.event.release.body }}')
            if [ -z "$NOTES_RAW" ]; then NOTES_FLAG=""; else NOTES_FLAG="$NOTES_RAW"; fi
            PUBLISHED_AT="${{ github.event.release.published_at }}"
          fi

          mkdir -p public

          # Build plugin.json using jq
          jq -n \
            --arg author "$AUTHOR" \
            --arg name "$NAME" \
            --arg internalName "$INTERNAL_NAME" \
            --arg assemblyVersion "$ASSEMBLY_VERSION" \
            --arg punchline "$PUNCHLINE" \
            --arg description "$DESCRIPTION" \
            --arg applicableVersion "$APPLICABLE_VERSION" \
            --argjson dalamudApiLevel "$DALAMUD_API_LEVEL" \
            --arg repoUrl "https://github.com/$REPO" \
            --arg downloadUrl "$DOWNLOAD_URL" \
            --arg lastUpdate "$(date +%s)" \
            '[
              {
                "Author": $author,
                "Name": $name,
                "InternalName": $internalName,
                "AssemblyVersion": $assemblyVersion,
                "Punchline": $punchline,
                "Description": $description,
                "ApplicableVersion": $applicableVersion,
                "DalamudApiLevel": $dalamudApiLevel,
                "RepoUrl": $repoUrl,
                "DownloadCount": 0,
                "LastUpdate": ($lastUpdate | tonumber),
                "DownloadLinkInstall": $downloadUrl,
                "DownloadLinkUpdate": $downloadUrl,
                "IconUrl": "",
                "Changelog": ""
              }
            ]' > public/plugin.json

          # Build version.json using jq
          if [ -z "$NOTES_FLAG" ]; then
            jq -n \
              --arg version "$VERSION" \
              --arg tag "$TAG" \
              --arg name "$NAME" \
              --arg author "$AUTHOR" \
              --arg punchline "$PUNCHLINE" \
              --arg downloadUrl "$DOWNLOAD_URL" \
              --arg releaseUrl "https://github.com/$REPO/releases/tag/$TAG" \
              --arg publishedAt "$PUBLISHED_AT" \
              '{
                "version": $version,
                "tag": $tag,
                "name": $name,
                "author": $author,
                "punchline": $punchline,
                "downloadUrl": $downloadUrl,
                "releaseUrl": $releaseUrl,
                "publishedAt": $publishedAt,
                "notes": null
              }' > public/version.json
          else
            jq -n \
              --arg version "$VERSION" \
              --arg tag "$TAG" \
              --arg name "$NAME" \
              --arg author "$AUTHOR" \
              --arg punchline "$PUNCHLINE" \
              --arg downloadUrl "$DOWNLOAD_URL" \
              --arg releaseUrl "https://github.com/$REPO/releases/tag/$TAG" \
              --arg publishedAt "$PUBLISHED_AT" \
              --arg notes "$NOTES_FLAG" \
              '{
                "version": $version,
                "tag": $tag,
                "name": $name,
                "author": $author,
                "punchline": $punchline,
                "downloadUrl": $downloadUrl,
                "releaseUrl": $releaseUrl,
                "publishedAt": $publishedAt,
                "notes": $notes
              }' > public/version.json
          fi

          echo "Generated plugin.json and version.json for v$VERSION"

      - name: Copy static page assets
        shell: bash
        run: |
          mkdir -p public
          if [ -f docs/index.html ]; then
            cp docs/index.html public/index.html
            echo "Copied docs/index.html"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
