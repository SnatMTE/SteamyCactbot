name: Release - Update JSON & Deploy Pages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version number (e.g. 0.0.0.2)
        required: true
      tag:
        description: Git tag (e.g. v0.0.0.2)
        required: true
      notes:
        description: Release notes (optional)
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version info
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "notes=${{ inputs.notes }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.event.release.tag_name }}"
            CLEAN="${TAG#v}"
            CLEAN="${CLEAN#V}"
            echo "version=$CLEAN" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate plugin JSON
        id: generate
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          REPO="${{ github.repository }}"
          DOWNLOAD_URL="https://github.com/$REPO/releases/latest/download/CactbotUI.zip"

          # Read metadata from the source Dalamud manifest
          AUTHOR="$(jq -r '.Author // "Snat"' SteamyCactbot/SteamyCactbot.json)"
          NAME="$(jq -r '.Name // "CactbotUI"' SteamyCactbot/SteamyCactbot.json)"
          INTERNAL_NAME="$(jq -r '.InternalName // "CactbotUI"' SteamyCactbot/SteamyCactbot.json)"
          ASSEMBLY_VERSION="$(jq -r '.AssemblyVersion // "0.0.0.1"' SteamyCactbot/SteamyCactbot.json)"
          PUNCHLINE="$(jq -r '.Punchline // ""' SteamyCactbot/SteamyCactbot.json)"
          DESCRIPTION="$(jq -r '.Description // ""' SteamyCactbot/SteamyCactbot.json)"
          APPLICABLE_VERSION="$(jq -r '.ApplicableVersion // "any"' SteamyCactbot/SteamyCactbot.json)"
          DALAMUD_API_LEVEL="$(jq -r '.DalamudApiLevel // 15' SteamyCactbot/SteamyCactbot.json)"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NOTES_RAW="${{ steps.version.outputs.notes }}"
            if [ -z "$NOTES_RAW" ]; then NOTES="null"; else NOTES=$(echo "$NOTES_RAW" | jq -Rs '.'); fi
            PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          else
            NOTES=$(echo '${{ github.event.release.body }}' | jq -Rs '.')
            PUBLISHED_AT="${{ github.event.release.published_at }}"
          fi

          mkdir -p public

          cat <<EOF > public/plugin.json
      [
        {
          "Author": "$AUTHOR",
          "Name": "$NAME",
          "InternalName": "$INTERNAL_NAME",
          "AssemblyVersion": "$ASSEMBLY_VERSION",
          "Punchline": "$PUNCHLINE",
          "Description": "$DESCRIPTION",
          "ApplicableVersion": "$APPLICABLE_VERSION",
          "DalamudApiLevel": $DALAMUD_API_LEVEL,
          "RepoUrl": "https://github.com/$REPO",
          "DownloadCount": 0,
          "LastUpdate": $(date +%s),
          "DownloadLinkInstall": "$DOWNLOAD_URL",
          "DownloadLinkUpdate": "$DOWNLOAD_URL",
          "IconUrl": "",
          "Changelog": ""
        }
      ]
      EOF

          cat <<EOF > public/version.json
      {
        "version": "$VERSION",
        "tag": "$TAG",
        "name": "$NAME",
        "author": "$AUTHOR",
        "punchline": "$PUNCHLINE",
        "downloadUrl": "$DOWNLOAD_URL",
        "releaseUrl": "https://github.com/$REPO/releases/tag/$TAG",
        "publishedAt": "$PUBLISHED_AT",
        "notes": $NOTES
      }
      EOF

          echo "Generated plugin.json and version.json for v$VERSION"

      - name: Copy static page assets
        shell: bash
        run: |
          mkdir -p public
          if [ -f docs/index.html ]; then
            cp docs/index.html public/index.html
            echo "Copied docs/index.html"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
