name: Release - Update JSON & Deploy Pages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version number (e.g. 0.0.0.2)
        required: true
      tag:
        description: Git tag (e.g. v0.0.0.2)
        required: true
      notes:
        description: Release notes (optional)
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: windows-2022
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        shell: pwsh
        run: |
          $dst = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Path $dst -Force | Out-Null
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip $dst

      - name: Restore and build
        shell: pwsh
        run: |
          dotnet restore .\SteamyCactbot\SteamyCactbot.csproj --force-evaluate
          dotnet build .\SteamyCactbot\SteamyCactbot.csproj --configuration Release --no-restore

      - name: Extract version info
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "version=${{ inputs.version }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "tag=${{ inputs.tag }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            $rawNotes = "${{ inputs.notes }}"
            if ([string]::IsNullOrEmpty($rawNotes)) { $rawNotes = "" }
            "notes=$rawNotes" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Output "Using manual inputs: ${{ inputs.version }}"
          } else {
            $tag = "${{ github.event.release.tag_name }}"
            $clean = $tag -replace '^[vV]', ''
            "version=$clean" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Output "Extracted version: $clean"
          }

      - name: Generate plugin JSON
        id: generate
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $notesRaw = "${{ steps.version.outputs.notes }}"
          $repo = "${{ github.repository }}"

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $notes = if ([string]::IsNullOrEmpty($notesRaw)) { $null } else { $notesRaw }
            $publishedAt = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          } else {
            $body = "${{ github.event.release.body }}"
            $notes = if ([string]::IsNullOrEmpty($body)) { $null } else { $body }
            $publishedAt = "${{ github.event.release.published_at }}"
          }

          $downloadUrl = "https://github.com/$repo/releases/latest/download/CactbotUI.zip"

          # Read the built Dalamud manifest
          $manifestPath = "SteamyCactbot\bin\x64\Release\CactbotUI.json"
          $m = Get-Content $manifestPath | ConvertFrom-Json

          $author = $m.Author
          $name = $m.Name
          $internalName = $m.InternalName
          $assemblyVersion = $m.AssemblyVersion
          $punchline = $m.Punchline
          $description = $m.Description
          $applicableVersion = $m.ApplicableVersion
          $dalamudApiLevel = $m.DalamudApiLevel

          New-Item -ItemType Directory -Path public -Force | Out-Null

          # Plugin manifest (pluginmaster JSON array for Dalamud)
          $pluginObj = @(
            @{
              Author = $author
              Name = $name
              InternalName = $internalName
              AssemblyVersion = $assemblyVersion
              Punchline = $punchline
              Description = $description
              ApplicableVersion = $applicableVersion
              DalamudApiLevel = $dalamudApiLevel
              RepoUrl = "https://github.com/$repo"
              DownloadCount = 0
              LastUpdate = [int][double]::Parse((Get-Date -UFormat %s))
              DownloadLinkInstall = $downloadUrl
              DownloadLinkUpdate = $downloadUrl
              IconUrl = ""
              Changelog = ""
            }
          )
          $pluginJson = $pluginObj | ConvertTo-Json -Depth 3
          Set-Content -Path "public/plugin.json" -Value $pluginJson

          # Simple version.json for the webpage
          $versionObj = @{
            version = $version
            tag = $tag
            name = $name
            author = $author
            punchline = $punchline
            downloadUrl = $downloadUrl
            releaseUrl = "https://github.com/$repo/releases/tag/$tag"
            publishedAt = $publishedAt
            notes = $notes
          }
          $versionJson = $versionObj | ConvertTo-Json -Depth 2
          Set-Content -Path "public/version.json" -Value $versionJson

          Write-Output "Generated plugin.json and version.json for v$version"

      - name: Copy static page assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path public -Force | Out-Null
          if (Test-Path "docs/index.html") {
            Copy-Item "docs/index.html" "public/index.html"
            Write-Output "Copied docs/index.html"
          }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
