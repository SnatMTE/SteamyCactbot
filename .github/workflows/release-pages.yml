name: Release — Update JSON & Deploy Pages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 0.0.0.2)"
        required: true
      tag:
        description: "Git tag (e.g. v0.0.0.2)"
        required: true
      notes:
        description: "Release notes (optional)"
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from release tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "notes=${{ inputs.notes }}" >> "$GITHUB_OUTPUT"
            echo "Extracted version: ${{ inputs.version }}"
          else
            # Strip leading "v" or "V" from tag, e.g. "v0.0.0.2" → "0.0.0.2"
            TAG="${{ github.event.release.tag_name }}"
            CLEAN="${TAG#v}"
            CLEAN="${CLEAN#V}"
            echo "version=$CLEAN" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Extracted version: $CLEAN"
          fi

      - name: Generate version JSON
        id: generate
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ steps.version.outputs.tag }}"
            NOTES_RAW="${{ steps.version.outputs.notes }}"
            if [ -z "$NOTES_RAW" ]; then
              NOTES="null"
            else
              NOTES=$(echo "$NOTES_RAW" | jq -Rs '.')
            fi
            PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          else
            TAG="${{ github.event.release.tag_name }}"
            NOTES=$(echo '${{ github.event.release.body }}' | jq -Rs '.')
            PUBLISHED_AT="${{ github.event.release.published_at }}"
          fi

          REPO="${{ github.repository }}"

          # Read existing metadata from the Dalamud manifest
          AUTHOR="$(jq -r '.Author // "Snat"' SteamyCactbot/SteamyCactbot.json)"
          NAME="$(jq -r '.Name // "CactbotUI"' SteamyCactbot/SteamyCactbot.json)"
          PUNCHLINE="$(jq -r '.Punchline // ""' SteamyCactbot/SteamyCactbot.json)"
          DESCRIPTION="$(jq -r '.Description // ""' SteamyCactbot/SteamyCactbot.json)"
          TAGS="$(jq '.Tags // []' SteamyCactbot/SteamyCactbot.json)"

          DOWNLOAD_URL="https://github.com/$REPO/releases/latest/download/${NAME}.zip"

          mkdir -p public

          # ----------------------------------------------------------------
          # 1. Plugin manifest (Dalamud update channel format)
          # ----------------------------------------------------------------
          cat <<EOF > public/plugin.json
          {
            "Author": "$AUTHOR",
            "Name": "$NAME",
            "Punchline": "$PUNCHLINE",
            "Description": "$DESCRIPTION",
            "ApplicableVersion": "any",
            "Tags": $TAGS,
            "Version": "$VERSION",
            "DownloadLinkInstall": "$DOWNLOAD_URL",
            "DownloadLinkUpdate": "$DOWNLOAD_URL",
            "DownloadCount": 0,
            "IconUrl": "",
            "IsHide": false,
            "IsTestingExclusive": false,
            "LastUpdate": $(date +%s)
          }
          EOF

          # ----------------------------------------------------------------
          # 2. Simple version.json (for your webpage)
          # ----------------------------------------------------------------
          cat <<EOF > public/version.json
          {
            "version": "$VERSION",
            "tag": "$TAG",
            "name": "$NAME",
            "author": "$AUTHOR",
            "punchline": "$PUNCHLINE",
            "downloadUrl": "$DOWNLOAD_URL",
            "releaseUrl": "https://github.com/$REPO/releases/tag/$TAG",
            "publishedAt": "$PUBLISHED_AT",
            "notes": $NOTES
          }
          EOF

          echo "Generated plugin.json and version.json for v$VERSION"

      - name: Copy static page assets
        shell: bash
        run: |
          mkdir -p public
          # Copy the docs page if it exists, or create a default one
          if [ -f docs/index.html ]; then
            cp docs/index.html public/
            echo "Copied docs/index.html"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
