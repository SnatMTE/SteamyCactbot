<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SteamyCactbot — Releases</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --yellow: #d29922;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container {
      max-width: 700px;
      width: 100%;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .subtitle {
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 2rem;
      margin-bottom: 1.5rem;
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .version-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .version-badge {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
    }
    .tag-name {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .status-badge {
      display: inline-block;
      background: rgba(63, 185, 80, 0.15);
      color: var(--success);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.2rem 0.7rem;
      border-radius: 999px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      transition: background 0.2s;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: #238636;
      color: #fff;
    }
    .btn-primary:hover {
      background: #2ea043;
    }
    .btn-secondary {
      background: #21262d;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: #30363d;
    }
    .button-group {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.5rem 1rem;
      font-size: 0.9rem;
    }
    .meta-label {
      color: var(--muted);
    }
    .meta-value {
      color: var(--text);
      word-break: break-all;
    }
    .release-notes {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .release-notes:empty {
      display: none;
    }
    .loading {
      text-align: center;
      color: var(--muted);
      padding: 3rem 0;
    }
    .loading::after {
      content: '';
      display: inline-block;
      width: 1.2rem;
      height: 1.2rem;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      color: #f85149;
      text-align: center;
      padding: 2rem;
    }
    .footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SteamyCactbot</h1>
    <p class="subtitle">Cactbot overlay integration for FFXIV</p>

    <div id="app">
      <div class="loading">Loading release info</div>
    </div>

    <div class="footer">
      <a href="https://github.com/SnatMTE/SteamyCactbot">GitHub</a>
      &nbsp;·&nbsp;
      <span id="footer-version"></span>
    </div>
  </div>

  <script>
    async function loadReleaseData() {
      const app = document.getElementById('app');

      try {
        const res = await fetch('version.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        document.getElementById('footer-version').textContent = `v${data.version}`;

        app.innerHTML = `
          <div class="card">
            <h2>Latest Release</h2>
            <div class="version-row">
              <span class="version-badge">v${data.version}</span>
              <span class="tag-name">${data.tag}</span>
              <span class="status-badge">Latest</span>
            </div>
            <div class="button-group">
              <a class="btn btn-primary" href="${data.downloadUrl}" target="_blank">
                &#x2B07; Download ${data.name}.zip
              </a>
              <a class="btn btn-secondary" href="${data.releaseUrl}" target="_blank">
                View on GitHub
              </a>
            </div>
          </div>

          <div class="card">
            <h2>Details</h2>
            <div class="meta-grid">
              <span class="meta-label">Version</span>
              <span class="meta-value">${data.version}</span>

              <span class="meta-label">Tag</span>
              <span class="meta-value">${data.tag}</span>

              <span class="meta-label">Published</span>
              <span class="meta-value">${new Date(data.publishedAt).toLocaleDateString('en-GB', {
                year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
              })}</span>

              <span class="meta-label">Author</span>
              <span class="meta-value">${data.author}</span>

              <span class="meta-label">Description</span>
              <span class="meta-value">${data.punchline || '—'}</span>

              ${data.downloadUrl ? `
              <span class="meta-label">Download</span>
              <span class="meta-value"><a href="${data.downloadUrl}" style="color:var(--accent)">${data.name}.zip</a></span>
              ` : ''}
            </div>
            ${data.notes ? `<div class="release-notes">${escapeHtml(data.notes)}</div>` : ''}
          </div>
        `;
      } catch (err) {
        app.innerHTML = `<div class="error">Failed to load release info: ${err.message}</div>`;
      }
    }

    function escapeHtml(text) {
      // Remove surrounding quotes if the JSON stringification added them
      let s = text;
      if (typeof s === 'string' && s.startsWith('"') && s.endsWith('"')) {
        try { s = JSON.parse(s); } catch { /* keep as-is */ }
      }
      return s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    loadReleaseData();
  </script>
</body>
</html>
